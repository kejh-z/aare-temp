name: Daily Aare Temperature Email

on:
  workflow_dispatch: # triggered by cron-job.org at 18:00 Zurich time
    inputs:
      attempt:
        description: "Internal retry counter (do not set manually)"
        required: false
        default: "1"

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Aare data and send email
        id: send
        env:
          RESEND_API_KEY: ${{ secrets.AARE_TEMP }}
          ATTEMPT: ${{ github.event.inputs.attempt }}
        run: |
          node -e '
          const API_URL = "https://aareguru.existenz.ch/v2018/current?app=aare-temp&version=1.0.0";
          const RECIPIENTS = ["kevin@holden.ch", "jessica@holden.ch", "brigitte.lendl@bluewin.ch"];

          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

          // A few quick retries handle genuine transient blips. A blocked IP,
          // however, blocks every attempt in this run (same IP), so we fail
          // fast and let the failure step dispatch a fresh run on a new IP.
          const MAX_ATTEMPTS = 3;

          async function fetchAareData() {
            let lastErr;
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              try {
                const res = await fetch(API_URL, { headers: { "Accept": "application/json", "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" } });
                const text = await res.text();
                if (!res.ok) throw new Error("HTTP " + res.status + " from API");
                let parsed;
                try { parsed = JSON.parse(text); } catch (e) { throw new Error("Non-JSON response (starts with: " + text.slice(0, 80).replace(/\s+/g, " ").trim() + ")"); }
                if (!parsed || !parsed.aare || !Array.isArray(parsed.aarepast)) throw new Error("Unexpected JSON shape (got: " + JSON.stringify(parsed).slice(0, 100) + ")");
                return parsed;
              } catch (e) {
                lastErr = e;
                console.error("Fetch attempt " + attempt + "/" + MAX_ATTEMPTS + " failed: " + e.message);
                if (attempt < MAX_ATTEMPTS) await sleep(attempt * 3000);
              }
            }
            throw new Error("Aare API unavailable after " + MAX_ATTEMPTS + " attempts: " + lastErr.message);
          }

          async function sendReport() {
            const data = await fetchAareData();

            const now = new Date();
            const zurich = new Date(now.toLocaleString("en-US", { timeZone: "Europe/Zurich" }));
            const startOfDay = new Date(zurich.getFullYear(), zurich.getMonth(), zurich.getDate());
            const startTs = Math.floor(startOfDay.getTime() / 1000);

            const todayReadings = data.aarepast.filter(r => r.timestamp >= startTs && r.temperature !== null);

            let maxTemp, maxTime;
            if (todayReadings.length === 0) {
              maxTemp = data.aare.temperature;
              maxTime = data.aare.timestring;
            } else {
              let maxReading = todayReadings[0];
              for (const r of todayReadings) {
                if (r.temperature > maxReading.temperature) maxReading = r;
              }
              maxTemp = maxReading.temperature;
              const mt = new Date(maxReading.timestamp * 1000);
              maxTime = mt.toLocaleTimeString("de-CH", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Zurich" });
            }

            const currentTemp = data.aare.temperature;
            const flow = data.aare.flow;

            const today = now.toLocaleDateString("de-CH", { weekday: "long", year: "numeric", month: "long", day: "numeric", timeZone: "Europe/Zurich" });
            let swimVerdict;
            if (maxTemp >= 20) swimVerdict = "Perfect for swimming!";
            else if (maxTemp >= 18) swimVerdict = "Warm enough for a swim.";
            else if (maxTemp >= 16) swimVerdict = "A bit fresh, but doable.";
            else swimVerdict = "Too cold for most swimmers.";

            const subject = "Aare: " + maxTemp.toFixed(1) + "°C peak today";
            const html = "<div style=\"font-family:system-ui,sans-serif;max-width:480px;margin:0 auto\"><h2 style=\"color:#1a5276;margin-bottom:4px\">Aare Marzili — Daily Report</h2><p style=\"color:#666;margin-top:0\">" + today + "</p><div style=\"background:linear-gradient(135deg,#1a5276,#2e86c1);color:white;border-radius:12px;padding:24px;text-align:center;margin:16px 0\"><div style=\"font-size:48px;font-weight:bold\">" + maxTemp.toFixed(1) + "°C</div><div style=\"font-size:14px;opacity:0.9\">Peak temperature at " + maxTime + "</div></div><table style=\"width:100%;border-collapse:collapse;margin:16px 0\"><tr><td style=\"padding:8px 0;border-bottom:1px solid #eee\">Current temperature</td><td style=\"padding:8px 0;border-bottom:1px solid #eee;text-align:right;font-weight:bold\">" + currentTemp.toFixed(1) + "°C</td></tr><tr><td style=\"padding:8px 0;border-bottom:1px solid #eee\">Flow rate</td><td style=\"padding:8px 0;border-bottom:1px solid #eee;text-align:right;font-weight:bold\">" + flow + " m³/s</td></tr><tr><td style=\"padding:8px 0\">Measurements today</td><td style=\"padding:8px 0;text-align:right;font-weight:bold\">" + todayReadings.length + "</td></tr></table><p style=\"font-size:16px\">" + swimVerdict + "</p><p style=\"color:#999;font-size:12px;margin-top:24px\">Data from <a href=\"https://aaremarzili.ch\" style=\"color:#999\">aaremarzili.ch</a> via aare.guru API</p></div>";

            console.log("Max: " + maxTemp.toFixed(1) + "C at " + maxTime);

            const emailRes = await fetch("https://api.resend.com/emails", {
              method: "POST",
              headers: { "Authorization": "Bearer " + process.env.RESEND_API_KEY, "Content-Type": "application/json" },
              body: JSON.stringify({ from: "Aare Temp <aare@holden.ch>", to: RECIPIENTS, subject, html })
            });
            const result = await emailRes.json();
            if (!emailRes.ok) throw new Error("Resend send failed: " + JSON.stringify(result));
            console.log("Email sent! ID: " + result.id);
          }

          console.log("Run attempt #" + (process.env.ATTEMPT || "1"));
          sendReport().catch(e => { console.error(e); process.exit(1); });
          '

      - name: Re-dispatch a fresh run on failure
        if: failure()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          ATTEMPT: ${{ github.event.inputs.attempt }}
        run: |
          MAX=6
          CUR=${ATTEMPT:-1}
          if [ "$CUR" -ge "$MAX" ]; then
            echo "Reached max ($MAX) attempts for today; giving up. The data provider"
            echo "was likely blocking every IP we landed on. No email sent today."
            exit 0
          fi
          if [ -z "$GH_PAT" ]; then
            echo "No GH_PAT secret set, cannot dispatch a fresh run. Add a GitHub token"
            echo "as the GH_PAT repository secret to enable automatic IP-rotation retries."
            exit 0
          fi
          NEXT=$((CUR + 1))
          echo "Attempt $CUR failed (most likely a blocked datacenter IP)."
          echo "Waiting 90s, then dispatching a fresh run (#$NEXT) on a new runner/IP..."
          sleep 90
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/kejh-z/aare-temp/actions/workflows/daily-email.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"attempt\":\"$NEXT\"}}"
          echo "Dispatched fresh run #$NEXT."
